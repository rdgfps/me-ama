<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Você me ama?</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: #111;
        font-family: Arial, sans-serif;
        color: white;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .container {
        z-index: 2;
        padding: 20px;
    }

    h1 {
        font-size: 1.8rem;
        margin-bottom: 25px;
    }

    .botoes {
        display: flex;
        gap: 15px;
        justify-content: center;
    }

    button {
        padding: 14px 22px;
        font-size: 16px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
    }

    #sim {
        background: #ff4d6d;
        color: white;
    }

    #nao {
        background: #555;
        color: white;
        position: fixed;
    }

    /* corações */
    .heart {
        position: fixed;
        bottom: -40px;
        font-size: 20px;
        animation: subir linear forwards;
    }

    @keyframes subir {
        from {
            transform: translateY(0);
            opacity: 1;
        }
        to {
            transform: translateY(-110vh);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Você me ama? 😏</h1>
    <div class="botoes">
        <button id="sim">Sim</button>
        <button id="nao">Não</button>
    </div>
</div>

<script>
    const nao = document.getElementById("nao");
    const sim = document.getElementById("sim");

    function fugirBotao() {
        const largura = window.innerWidth - 100;
        const altura = window.innerHeight - 60;

        const x = Math.random() * largura;
        const y = Math.random() * altura;

        nao.style.left = x + "px";
        nao.style.top = y + "px";
    }

    // desktop
    nao.addEventListener("mouseover", fugirBotao);

    // celular (toque)
    nao.addEventListener("touchstart", (e) => {
        e.preventDefault();
        fugirBotao();
    });

    // clique no sim
    sim.addEventListener("click", () => {
        alert("Sabia 😌 demorou, mas admitiu.");
    });

    // corações
    function criarCoracao() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }

    setInterval(criarCoracao, 400);
</script>

</body>
</html>
